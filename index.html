<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ева ❤️ Егор</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            font-family: 'Arial', sans-serif;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }
        
        .names {
            font-size: 4em;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin: 30px 0;
        }
        
        h1 {
            color: white;
            margin: 30px 0;
            font-size: 2.5em;
        }
        
        .languages {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 30px;
            margin: 30px 0;
        }
        
        .language-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 10px;
            padding: 20px;
        }
        
        .language-item {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            padding: 10px;
            color: #d32f2f;
            font-weight: bold;
        }
        
        .photos {
            margin: 50px 0;
        }
        
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        
        .photo-card {
            background: white;
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .photo-card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 10px;
            background-color: #ff9a9e;
        }
        
        .photo-card p {
            margin-top: 10px;
            color: #ff6b6b;
            font-weight: bold;
            font-size: 1.2em;
        }
        
        .footer {
            color: white;
            font-size: 1.3em;
            margin: 40px 0;
            padding: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="names">
            ❤️ Ева ❤️ Егор ❤️
        </div>
        
        <h1>100 способов сказать "Я тебя люблю"</h1>
        
        <div class="languages">
            <h2 style="color: white;">🌍 Для тебя, Ева! 🌍</h2>
            <div class="language-grid" id="languageGrid"></div>
        </div>
        
        <div class="photos">
            <h2 style="color: white;">📸 Наши фотографии 📸</h2>
            <div class="photo-grid" id="photoGrid"></div>
        </div>
        
        <div class="footer">
            <p>Ева, я тебя очень люблю!</p>
            <p>Твой Егор ❤️</p>
        </div>
    </div>

    <script>
        // 100 фраз на разных языках
        const languages = [
            "🇷🇺 Русский: Я тебя люблю",
            "🇬🇧 Английский: I love you",
            "🇪🇸 Испанский: Te quiero / Te amo",
            "🇫🇷 Французский: Je t'aime",
            "🇩🇪 Немецкий: Ich liebe dich",

            "🇮🇱 Иврит: אני אוהב אותך (Ani ohev otach)",
            "🇹🇭 Тайский: ฉันรักคุณ (Chan rak khun)",
            "🇻🇳 Вьетнамский: Anh yêu em",
            "🇮🇩 Индонезийский: Aku cinta kamu",
            "🇵🇭 Тагальский: Mahal kita",
            "🇹🇿 Суахили: Nakupenda",
            "🇿🇦 Африкаанс: Ek is lief vir jou",
            "🇮🇸 Исландский: Ég elska þig",
            "🇮🇪 Ирландский: Gráim thú",
            "  Шотландский: Tha gaol agam ort",
            "  Валлийский: Rwy'n dy garu di",
            "  Латынь: Te amo",
            "  Эсперанто: Mi amas vin",

            "🇬🇪 Грузинский: მიყვარხარ (Miq'varkhar)",
            "🇦🇲 Армянский: Ես քեզ սիրում եմ (Yes kez sirum em)",
            "🇦🇿 Азербайджанский: Mən səni sevirəm",
            "🇰🇿 Казахский: Мен сені жақсы көремін (Men seni jaqsy köremin)",
            "🇺🇿 Узбекский: Men seni sevaman",
            "🇹🇯 Таджикский: Ман туро дӯст медорам (Man turo dūst medoram)",
            "🇰🇬 Киргизский: Мен сени сүйөмүн (Men seni süyömün)",
            "🇹🇲 Туркменский: Men seni söýýärin",

            "🇮🇳 Малаялам: ഞാൻ നിന്നെ സ്നേഹിക്കുന്നു (Njan ninne snehikkunnu)",
            "🇮🇳 Каннада: ನಾನು ನಿನ್ನನ್ನು ಪ್ರೀತಿಸುತ್ತೇನೆ (Nanu ninnanu pritisuttene)",
            "🇮🇳 Маратхи: मी तुझ्यावर प्रेम करतो (Mi tujhyavar prem karto)",
            "🇮🇳 Гуджарати: હું તને પ્રેમ કરું છું (Hun tane prem karun chhun)",
            "🇮🇳 Панджаби: ਮੈਂ ਤੈਨੂੰ ਪਿਆਰ ਕਰਦਾ ਹਾਂ (Main tenu pyaar karda haan)",
            "🇳🇵 Непальский: म तिमीलाई माया गर्छु (Ma timilai maya garchhu)",

            "🇲🇾 Малайский: Saya cintakan awak",
            "🇵🇰 Урду: میں تم سے پیار کرتا ہوں (Main tumse pyaar karta hoon)",
            "🇮🇷 Персидский: دوستت دارم (Dooset daram)",
            "🇦🇫 Пушту: زه تا سره مینه کوم (Za ta sara mina kawom)",
            "🇸🇴 Сомалийский: Waan ku jeclahay",
            "🇪🇹 Амхарский: እወድሃለሁ (Ewedihalehu)",
            "🇳🇬 Хауса: Ina son ku",
            "🇳🇬 Игбо: Ahụrụ m gị n'anya",
            "🇳🇬 Йоруба: Mo nifẹ rẹ",
            "🇿🇦 Зулу: Ngiyakuthanda",
            "🇿🇦 Коса: Ndiyakuthanda",
            "🇱🇸 Сесото: Kea u rata",
            "🇧🇼 Тсвана: Ke a go rata",
            "🇿🇼 Шона: Ndinokuda",
            "🇲🇼 Чева: Ndimakukondani",
            "🇲🇬 Малагасийский: Tiako ianao",
            "🇵🇪 Кечуа: Munakuykim",
            "🇧🇴 Аймара: Munsmawa",
            "🇵🇾 Гуарани: Rohayhu",
            "🇭🇺 Венгерский: Szeretlek",
            "🇫🇮 Финский: Rakastan sinua",
            "🇪🇪 Эстонский: Ma armastan sind",
            "🇱🇻 Латышский: Es tevi mīlu",
            "🇱🇹 Литовский: Tave myliu",
            "🇵🇱 Польский: Kocham cię",
            "🇨🇿 Чешский: Miluji tě",
            "🇸🇰 Словацкий: Ľúbim ťa",
            "🇸🇮 Словенский: Ljubim te",
            "🇭🇷 Хорватский: Volim te",
            "🇧🇦 Боснийский: Volim te",
            "🇦🇱 Албанский: Te dua",
            "🇷🇴 Румынский: Te iubesc",
            "🇲🇩 Молдавский: Te iubesc",
            "🇧🇬 Болгарский: Обичам те",
            "🇷🇸 Сербский: Волим те",
            "🇲🇰 Македонский: Те сакам",
            "🇲🇪 Черногорский: Volim te"
        ];

        // Добавляем языки на страницу
        const languageGrid = document.getElementById('languageGrid');
        languages.forEach(lang => {
            const div = document.createElement('div');
            div.className = 'language-item';
            div.textContent = lang;
            languageGrid.appendChild(div);
        });

        // ПРОСТОЙ КОД ДЛЯ ФОТОГРАФИЙ
        // ===========================
        
        const photoGrid = document.getElementById('photoGrid');
        
        // Список фото и подписи к ним
        const photoList = [
            { name: 'photo1.jpg', text: '💕 Наше первое фото' },
            { name: 'photo2.jpg', text: '💕 Самый счастливый день' },
            { name: 'photo3.jpg', text: '💕 Ева и Егор' },
            { name: 'photo4.jpg', text: '💕 Любимая моя' },
            { name: 'photo5.jpg', text: '💕 Наше счастье' },
            { name: 'photo6.jpg', text: '💕 Вместе навсегда' }
        ];
        
        // Создаем карточки для каждого фото
        photoList.forEach(photo => {
            const card = document.createElement('div');
            card.className = 'photo-card';
            
            const img = document.createElement('img');
            
            // Пробуем загрузить фото из папки photos
            img.src = 'photos/' + photo.name;
            
            // Если фото не загрузилось, показываем заглушку
            img.onerror = function() {
                this.src = 'https://via.placeholder.com/300x300/ff9a9e/ffffff?text=' + encodeURIComponent(photo.text.replace('💕', '❤️'));
                this.style.objectFit = 'contain';
            };
            
            card.appendChild(img);
            
            const p = document.createElement('p');
            p.textContent = photo.text;
            card.appendChild(p);
            
            photoGrid.appendChild(card);
        });
        
        // Для отладки - выводим информацию в консоль
        console.log('Сайт загружен! Фото должны быть в папке photos/');
    </script>
</body>
</html>
